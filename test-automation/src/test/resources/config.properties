# ─── Target ───────────────────────────────────────────────────────────────────
# Use the Netlify URL for production tests (Netlify Forms work there).
# Switch to the local file URL for offline/CI runs:
#   base.url=file:///D:/Work/My%20Website/index.html
base.url=https://mhdhasan.netlify.app/

# ─── Browser ──────────────────────────────────────────────────────────────────
# Supported: chrome | firefox | edge
browser=chrome

# Run browser without a visible window (useful in CI)
headless=false

# ─── Timeouts (seconds) ───────────────────────────────────────────────────────
implicit.wait=5
explicit.wait=15
page.load.timeout=30
